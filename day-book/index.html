<!DOCTYPE html>
<html lang="ua">
<head>
	<meta charset="UTF-8"> <!-- Кодировка UTF-8 -->
	<title>Щоденник</title>	<!-- Заголовак -->
	<style>body{opacity: 0;overflow-x: hidden;}html{background: url(back-groung.webp), #221126;}</style> <!-- Стиль при загрузкі WEB сторінки -->
</head>
<body>

	<!-- Page1 || Головна сторінка || Розклад  -->
	<!-- Wrapper -->
    <div class="wrapper">
      <div class="day-book">

      	<!-- Header -->
      	<div class="week">
      		<i class="fas fa-angle-left prev"></i> <!-- Кнопка зміни дня тижня -->
      			<div class="weekday">
      				<h1>
      					<!-- Js || Відправка дня тижня за допомогою renderDayBook() -->
      				</h1>
      			</div>
      		<i class="fas fa-angle-right next"></i> <!-- Кнопка зміни дня тижня -->
      	</div>
      	<!-- //Header//-->

      	<!-- Body -->
      	<div class="tables">
      		<ol>
      			<!-- Js || Відправка розкладу за допомогою renderDayBook() -->
      		</ol>
     	</div>
      	<a class="menu-btn-on">
      		<i class="far fa-clock"></i> <!-- Кнопка закриття => wrapper -->
      	</a>
      <!-- //Body// -->

  	  </div>
	</div>
	<!-- //Wrapper// -->
	<!-- //Page1//  -->

	<!-- Page2 || Сторінка з розкладом дзвінків -->
	<!-- Wrapper-time -->
	<div class="wrapper-time">
		<div class="call-schedule">

			<!-- Header -->
			<div class="time-header">
				<h1>Розклад дзвінків</h1>
			</div>
			<!-- //Header// -->

			<!-- Body -->
			<div class="inner">

				<div class="time">
					<h1 id="clock">00:00</h1>
				</div>

				<ol>
					<li>8:00 - 8:45</li>
				    <li>9:05 - 9:50</li>
				    <li>10:10 - 10:55</li>
				   	<li>11:15 - 12:00</li>
				   	<li>12:20 - 13:05</li>
				  	<li>13:20 - 14:00</li>
				    <li>14:15 - 14:55</li>
		     	</ol>

			</div>
			<!-- //Body// -->

		</div>
		<a class="menu-btn-off">
			<i class="fas fa-times"></i> <!-- Кнопка закриття => wrapper-time -->
		</a>
	</div>
	<!-- //Wrapper-time// -->

<!-- Script -->
<script src="app.js"></script>
<script src="https://kit.fontawesome.com/034599bd01.js" crossorigin="anonymous"></script>
<!-- //Script// -->

<!-- Link -->
<link rel="icon" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<!-- //Link// -->

</body>
</html>
